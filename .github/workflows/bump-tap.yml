name: bump-tap

# Fires when a release moves from draft to published (or a non-draft release
# is created directly) — i.e. the exact moment you click "Publish release".
# Assets on a draft aren't publicly downloadable, so this can't run in the
# same job that creates the draft (see release.yml). workflow_dispatch lets
# you retry a failed run for an already-published release without having to
# unpublish/republish it.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to bump the tap to (e.g. v0.2.0)"
        required: true

jobs:
  bump-cask:
    runs-on: macos-latest
    steps:
      - name: Resolve target tag
        id: target
        run: echo "tag=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Locate dmg asset on the published release
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=$(gh release view "${{ steps.target.outputs.tag }}" --repo "${{ github.repository }}" \
            --json assets -q '[.assets[] | select(.name | endswith(".dmg"))]')
          count=$(jq 'length' <<<"$assets")
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly one .dmg asset on this release, found $count."
            exit 1
          fi
          # `url` here is the plain public download link (repo is public, no
          # auth needed) — used both to fetch the file for hashing and as the
          # Cask's final url. There is no separate "browser_download_url"
          # field on this gh CLI output; that was a bug.
          jq -r '.[0].name' <<<"$assets" | sed 's/^/name=/' >> "$GITHUB_OUTPUT"
          jq -r '.[0].url' <<<"$assets" | sed 's/^/url=/' >> "$GITHUB_OUTPUT"

      - name: Download asset and compute sha256
        id: hash
        run: |
          set -euo pipefail
          echo "Downloading ${{ steps.asset.outputs.name }}..."
          curl -sL --fail "${{ steps.asset.outputs.url }}" -o asset.dmg

          size_bytes=$(stat -f%z asset.dmg)
          if [ "$size_bytes" -lt 102400 ]; then
            echo "::error::Downloaded asset is only ${size_bytes} bytes — likely an error page, not a DMG."
            exit 1
          fi
          # `file` doesn't reliably recognize UDIF images (they read back as
          # generic "zlib compressed data"); hdiutil actually understands the
          # format and is what verifies it's a real, unbroken disk image.
          if ! hdiutil imageinfo asset.dmg >/dev/null 2>&1; then
            echo "::error::Downloaded file is not a valid disk image:"
            hdiutil imageinfo asset.dmg || true
            exit 1
          fi

          echo "sha256=$(shasum -a 256 asset.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update the tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.target.outputs.tag }}"
          version="${version#v}"

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/skixmix/homebrew-antani.git" tap
          cd tap

          sed -i '' "s#version \".*\"#version \"$version\"#" Casks/antani.rb
          sed -i '' "s#sha256 \".*\"#sha256 \"${{ steps.hash.outputs.sha256 }}\"#" Casks/antani.rb
          sed -i '' "s#url \".*\"#url \"${{ steps.asset.outputs.url }}\"#" Casks/antani.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump antani to $version" || exit 0
          git push
