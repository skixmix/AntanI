name: bump-tap

# Fires when a release moves from draft to published (or a non-draft release
# is created directly) — i.e. the exact moment you click "Publish release".
# Assets on a draft aren't publicly downloadable, so this can't run in the
# same job that creates the draft (see release.yml).
on:
  release:
    types: [published]

jobs:
  bump-cask:
    runs-on: macos-latest
    steps:
      - name: Locate dmg asset on the published release
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name=$(gh release view "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" \
            --json assets -q '.assets[] | select(.name | endswith(".dmg")) | .name')
          url=$(gh release view "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" \
            --json assets -q '.assets[] | select(.name | endswith(".dmg")) | .url')
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Download asset and compute sha256
        id: hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sL -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "${{ steps.asset.outputs.url }}" -o asset.dmg
          echo "sha256=$(shasum -a 256 asset.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update the tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          download_url=$(gh release view "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" \
            --json assets -q '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url')

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/skixmix/homebrew-antani.git" tap
          cd tap

          sed -i '' "s#version \".*\"#version \"$version\"#" Casks/antani.rb
          sed -i '' "s#sha256 \".*\"#sha256 \"${{ steps.hash.outputs.sha256 }}\"#" Casks/antani.rb
          sed -i '' "s#url \".*\"#url \"$download_url\"#" Casks/antani.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump antani to $version" || exit 0
          git push
