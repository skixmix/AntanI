name: release

# Two ways to ship a release:
#  1. Merge a PR titled "Release vX.Y.Z" into main (version bump lives in the
#     PR diff, read from tauri.conf.json here). Gated on the actual PR title
#     via the pull_request/closed event — NOT on the merge commit message,
#     since GitHub's squash-commit message format depends on a repo setting
#     and isn't reliably "just the PR title."
#  2. Push a "v*" tag yourself (manual escape hatch, e.g. a hotfix).
#
# Both converge on the same job so a tag created by this workflow's own
# GITHUB_TOKEN never needs to retrigger anything (GitHub doesn't retrigger
# workflows from GITHUB_TOKEN-authored pushes, tags included).
on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    tags: ["v*"]

jobs:
  publish-tauri:
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Release'))
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'main' }}

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version=$(jq -r .version src-tauri/tauri.conf.json)
            tag="v$version"
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists — bump the version in tauri.conf.json."
              exit 1
            fi
            git tag "$tag"
            git push origin "$tag"
            echo "name=$tag" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Self-signed cert (no Apple account). Same cert every build => stable
          # code-signing Designated Requirement => macOS TCC grants (Full Disk
          # Access) survive `brew upgrade`. Deliberately NOT notarized: this does
          # nothing for Gatekeeper, only for permission persistence.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: AntanI Code Signing
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "AntanI ${{ steps.tag.outputs.name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: true
          prerelease: false
          # No auto-update plugin by design (see AGENTS.md) — no updater manifest to publish.
          uploadUpdaterJson: false
          args: --target universal-apple-darwin
